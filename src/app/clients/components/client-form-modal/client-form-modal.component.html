@if (isOpen()) {
  <div
    class="fixed inset-0 bg-overlay z-50 flex items-center justify-center p-4"
  >
    <div
      class="bg-surface border border-border rounded-xl shadow-xl w-full max-w-lg max-h-[90vh] flex flex-col animate-fade-in"
    >
      <!-- Header -->
      <div
        class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 rounded-lg bg-brand/10 flex items-center justify-center"
          >
            <span class="fa-solid fa-user text-brand text-sm"></span>
          </div>
          <h2 class="font-semibold text-text-primary">
            {{ client() ? "Editar cliente" : "Nuevo cliente" }}
          </h2>
        </div>
        <button
          class="p-1.5 rounded-lg text-text-muted hover:text-text-primary hover:bg-background transition-colors"
          (click)="onCancel()"
        >
          <span class="fa-solid fa-xmark"></span>
        </button>
      </div>

      <!-- Body -->
      <div class="px-6 py-4 overflow-y-auto custom-secondary-scrollbar flex-1">
        <app-client-form-inline
          [initialData]="formInitialData()"
          [editClientId]="client()?.id"
          (saved)="onSaved()"
          (cancel)="onCancel()"
        />
      </div>
    </div>
  </div>
}

<div class="pds-page">

  <!-- Header de estado de mesas -->
  <app-table-header-status (status)="selectedTableStatus.set($event)" />

  <!-- Toast de error -->
  @if (errorMessage()) {
    <div class="fixed top-4 right-4 z-50 max-w-lg animate-fade-in">
      <div class="pds-alert-error shadow-xl backdrop-blur-sm">
        <span class="fa-solid fa-circle-exclamation text-lg shrink-0"></span>
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-sm">Error en el pedido</p>
          <p class="text-xs mt-0.5 opacity-80 whitespace-pre-wrap">{{ errorMessage() }}</p>
        </div>
        <button
          (click)="errorMessage.set(null)"
          class="text-red-400/60 hover:text-red-300 transition-colors shrink-0"
        >
          <span class="fa-solid fa-xmark text-sm"></span>
        </button>
      </div>
    </div>
  }

  <!-- Grid de mesas -->
  <app-table-list
    [tables]="tablesResource.value()?.content ?? []"
    [isEmpty]="(tablesResource.value()?.content?.length ?? 0) === 0"
    [isLoading]="tablesResource.isLoading()"
    [activeOrdersByTable]="activeOrdersByTable()"
    [modifyStatus]="modifyStatusChanged()"
    (modifyStatusChanged)="onModifyStatusChanged($event)"
    (statusChange)="onStatusChange($event.orderId, $event.newStatus)"
    (orderCreated)="onOrderCreated($event)"
    (orderUpdated)="onOrderUpdated($event.id, $event.order)"
    (refresh)="onRefresh()"
  />

  <app-pagination
    [pages]="tablesResource.value()?.totalPages ?? 0"
    [currentPage]="this.paginationService.currentPage()"
  />

</div>

<!-- Background image -->
<div
  class="absolute inset-0 bg-cover bg-center bg-no-repeat"
  style="background-image: url('https://imageproxy.wolt.com/assets/6846cecbd31f00f9026c5283')"
></div>

<!-- Overlay -->
<div class="absolute inset-0 bg-background/75"></div>

<!-- Login card -->
<div class="relative z-10 w-full max-w-md p-8 mx-4 bg-surface/85 backdrop-blur-sm rounded-2xl shadow-2xl border border-border-subtle/50 transition-all duration-500">

  <!-- Logo & título -->
  <div class="text-center mb-8">
    <div class="flex items-center justify-center gap-2 mb-3 text-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24">
        <path fill="currentColor" d="m8.1 13.34l2.83-2.83L3.91 3.5a4.01 4.01 0 0 0 0 5.66zm6.78-1.81c1.53.71 3.68.21 5.27-1.38c1.91-1.91 2.28-4.65.81-6.12c-1.46-1.46-4.2-1.1-6.12.81c-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88l1.41-1.41L13.41 13z"/>
      </svg>
      <h1 class="text-3xl sm:text-4xl font-bold text-text-primary">El {{ envs.companyName }}</h1>
    </div>
    <p class="text-text-secondary text-sm">Bienvenido de nuevo</p>
  </div>

  <form class="space-y-5 transition-all duration-300" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <!-- Error -->
    @if (hasError()) {
      <div role="alert" class="pds-alert-error animate-fade-in">
        <span class="fa-solid fa-circle-xmark shrink-0"></span>
        <span>Por favor verifique la información ingresada.</span>
      </div>
    }

    <!-- Usuario -->
    <div class="relative">
      <span class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-sm pointer-events-none"></span>
      <input
        type="text"
        placeholder="Usuario"
        formControlName="username"
        class="pds-input pl-11"
      />
      <div
        class="absolute inset-y-0 right-0 pr-3 flex items-center tooltip tooltip-bottom"
        data-tip="Debe tener entre 4 y 30 caracteres, solo letras, números o guión"
      >
        <span class="fa-solid fa-circle-info text-text-muted text-sm"></span>
      </div>
    </div>

    <!-- Contraseña -->
    <div class="relative">
      <span class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-sm pointer-events-none"></span>
      <input
        [type]="showPassword() ? 'text' : 'password'"
        placeholder="Contraseña"
        formControlName="password"
        class="pds-input pl-11 pr-20"
      />
      <button
        type="button"
        class="absolute inset-y-0 right-8 flex items-center px-2 text-text-muted hover:text-text-secondary focus:outline-none transition-colors"
        (click)="togglePasswordVisibility()"
        aria-label="Mostrar/Ocultar contraseña"
      >
        @if (!showPassword()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
              <path d="M3 13c3.6-8 14.4-8 18 0"/>
              <path d="M12 17a3 3 0 1 1 0-6a3 3 0 0 1 0 6"/>
            </g>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 16 16">
            <path fill="currentColor" d="m10.12 10.827l4.026 4.027a.5.5 0 0 0 .708-.708l-13-13a.5.5 0 1 0-.708.708l3.23 3.23A6 6 0 0 0 3.2 6.182a6.7 6.7 0 0 0-1.117 1.982c-.021.061-.047.145-.047.145l-.018.062s-.076.497.355.611a.5.5 0 0 0 .611-.355l.001-.003l.008-.025l.035-.109a5.7 5.7 0 0 1 .945-1.674a5 5 0 0 1 1.124-1.014L6.675 7.38a2.5 2.5 0 1 0 3.446 3.446m-.74-.74A1.5 1.5 0 1 1 7.413 8.12zM6.32 4.2l.854.854Q7.564 5 8 5c2.044 0 3.286.912 4.028 1.817a5.7 5.7 0 0 1 .945 1.674q.025.073.035.109l.008.025v.003l.001.001a.5.5 0 0 0 .966-.257v-.003l-.001-.004l-.004-.013a2 2 0 0 0-.06-.187a6.7 6.7 0 0 0-1.117-1.982C11.905 5.089 10.396 4 8.002 4c-.618 0-1.177.072-1.681.199"/>
          </svg>
        }
      </button>
      <div
        class="absolute inset-y-0 right-0 pr-3 flex items-center tooltip tooltip-bottom"
        data-tip="Mínimo 8 caracteres, debe incluir mayúscula, minúscula, número y caracter especial"
      >
        <span class="fa-solid fa-circle-info text-text-muted text-sm"></span>
      </div>
    </div>

    <!-- Submit -->
    <button
      type="submit"
      class="pds-btn-primary w-full h-12 justify-center font-semibold tracking-wide shadow-lg shadow-brand/20 hover:shadow-brand/30"
    >
      Iniciar Sesión
    </button>

  </form>
</div>

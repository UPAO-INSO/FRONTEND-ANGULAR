<div class="pds-card px-4 py-3 flex items-center gap-3">
  <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 {{ iconBg() }}">
    <span class="{{ icon() }} {{ iconColor() }}"></span>
  </div>
  <div class="min-w-0">
    <p class="text-xs text-text-muted uppercase tracking-wide truncate">{{ label() }}</p>
    <p class="text-xl font-bold font-mono {{ valueColor() }}">{{ value() }}</p>
  </div>
</div>

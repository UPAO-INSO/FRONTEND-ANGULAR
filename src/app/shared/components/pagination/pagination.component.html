<div class="flex items-center justify-center h-full w-full font-poppins-semibold">
  <div class="flex items-center gap-2">

    <button
      class="pds-btn-icon disabled:opacity-30"
      (click)="previousPage()"
      [disabled]="currentPage() <= 1"
    >
      <span class="fa-solid fa-arrow-left text-sm"></span>
    </button>

    <span class="flex items-center justify-center h-9 w-9 rounded-full bg-surface border border-border text-text-primary text-sm font-semibold">
      {{ currentPage() }}
    </span>

    <button
      class="pds-btn-icon disabled:opacity-30"
      (click)="nextPage()"
      [disabled]="currentPage() >= pages()"
    >
      <span class="fa-solid fa-arrow-right text-sm"></span>
    </button>

  </div>
</div>

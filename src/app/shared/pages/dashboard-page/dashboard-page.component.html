<div class="flex h-screen bg-background overflow-hidden font-display">

  <!-- Sidebar -->
  <app-sidebar [isOpen]="sidebarOpen()" (closed)="closeSidebar()" />

  <!-- Área principal -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top bar móvil -->
    <header class="lg:hidden flex items-center gap-3 px-4 py-3 bg-surface border-b border-border shrink-0">
      <button
        class="w-8 h-8 rounded-lg bg-background flex items-center justify-center
               text-text-secondary hover:text-text-primary transition-colors"
        (click)="toggleSidebar()"
        aria-label="Menú"
      >
        <span class="fa-solid fa-bars text-sm"></span>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 bg-brand rounded-md flex items-center justify-center">
          <span class="fa-solid fa-utensils text-white text-[10px]"></span>
        </div>
        <span class="text-sm font-bold text-text-primary">{{ envs.companyName }}</span>
      </div>
    </header>

    <!-- Contenido de la página -->
    <main class="flex-1 overflow-y-auto custom-scrollbar">
      <router-outlet />
    </main>

  </div>

  <!-- Notificaciones en tiempo real (WebSocket) -->
  <app-notifications />

  <!-- Advertencia de inactividad + modal de sesión expirada -->
  <app-session-warning />

</div>

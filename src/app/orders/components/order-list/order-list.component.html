<div class="font-display">

  <app-list-state
    [loading]="isLoading()"
    [error]="errorMessage()"
    [empty]="isEmpty()"
    emptyIcon="clipboard-list"
    emptyTitle="No se encontraron órdenes"
    emptyMessage="Las órdenes aparecerán aquí cuando se creen"
    loadingMessage="Cargando pedidos..."
  >
    <div class="pt-3 sm:pt-4 border-t border-border">
      <div class="space-y-3 sm:space-y-4 pb-4">
        @for (order of orders(); track order.id) {
          <app-order-list-item
            class="block"
            [order]="order"
            (orderSelected)="openViewOrder($event)"
          />
        }
      </div>
    </div>
  </app-list-state>

  @if (selectedOrder()) {
    <app-order-view
      [activeOrder]="selectedOrder()!"
      [isAtm]="true"
      textConfirm="Marcar como Pagado"
      [changeStatusQuery]="orderStatus.PAID"
      (statusChange)="onChangeStatus($event.orderId, $event.newStatus)"
      (closeModal)="closeViewOrder()"
    />
  }

  <div>
    <app-pagination [pages]="totalPages()" [currentPage]="currentPage()" />
  </div>

</div>

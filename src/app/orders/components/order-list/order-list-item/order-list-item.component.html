<div
  class="relative bg-side-background text-text-muted rounded-lg shadow-lg hover:shadow-xl p-3 sm:p-4 md:p-5 border-l-4 {{ borderClass(order().orderStatus) }} cursor-pointer overflow-hidden group transition-shadow duration-200"
  (click)="onOrderClick()"
>
  <!-- Hover gradient -->
  <div
    class="absolute inset-[-5px] w-[calc(100vh/5)] {{ gradientClass(order().orderStatus) }} -translate-x-full group-hover:translate-x-0 transition-all duration-300 ease-out rounded-lg pointer-events-none"
  ></div>

  <main class="relative z-10 flex flex-col sm:flex-row justify-between items-start text-text-primary gap-3 sm:gap-4 duration-500 ease-out active:scale-[0.98]">

    <!-- Izquierda: info + productos -->
    <section class="flex-1 min-w-0 w-full sm:w-auto">
      <div class="flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-6">

        <div class="shrink-0 max-w-[150px]">
          <h3 class="font-bold text-base sm:text-lg md:text-xl truncate">
            Orden {{ order().id }}
          </h3>
          <p class="text-xs sm:text-sm text-text-secondary mt-0.5">
            <span class="fa-solid fa-table text-text-secondary mr-1"></span>
            Mesa {{ order().tableId }}
          </p>
        </div>

        <div class="flex-1 min-w-0 max-w-[340px] sm:pt-1">
          <p class="text-xs sm:text-sm text-text-secondary mb-1 hidden sm:block">Productos:</p>
          <p
            class="text-xs sm:text-sm text-text-primary sm:pl-2 line-clamp-2 sm:line-clamp-1 truncate"
            [title]="getProductsDisplayText(order().productOrders)"
          >
            {{ getProductsDisplayText(order().productOrders) | titlecase }}
          </p>
        </div>

      </div>
    </section>

    <!-- Derecha: badge + hora -->
    <section class="flex sm:flex-col justify-between sm:justify-start items-start sm:items-end gap-2 sm:gap-1 shrink-0 w-full sm:w-auto">
      <app-status-badge [status]="order().orderStatus" />

      <div class="flex items-center gap-1 text-text-secondary">
        <span class="fa-solid fa-clock text-xs"></span>
        <p class="text-xs sm:text-sm whitespace-nowrap">
          {{ order().createdAt | date: 'HH:mm' }} {{ getOrderAmPm(order()) }}
        </p>
      </div>
    </section>

  </main>

  <!-- Badge de conteo (solo mobile) -->
  <div class="absolute top-2 right-2 sm:hidden">
    <span class="badge badge-xs bg-surface-nav/80 text-text-secondary border-0">
      {{ order().productOrders.length }} {{ order().productOrders.length === 1 ? 'item' : 'items' }}
    </span>
  </div>
</div>

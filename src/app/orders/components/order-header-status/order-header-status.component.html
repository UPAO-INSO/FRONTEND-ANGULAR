<div class="pds-page-header font-display">

  <!-- Título + búsqueda -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3 w-full sm:w-auto">
    <h1 class="pds-page-title flex items-center gap-2 shrink-0">
      <span class="fa-solid fa-receipt text-brand"></span>
      Pedidos
    </h1>

    <div class="pds-search w-full sm:w-52">
      <span class="pds-search-icon fa-solid fa-magnifying-glass"></span>
      <app-search-table-input
        class="contents"
        (value)="tableNumberValue($event)"
      />
    </div>
  </div>

  <!-- Filtros de estado — tabletas/desktop -->
  <div class="hidden sm:flex items-center gap-1 bg-background-secondary rounded-xl p-1">
    @for (filter of statusFilters; track filter.status ?? 'all') {
      <button
        class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-150 whitespace-nowrap"
        [class.bg-surface]="isStatusSelected(filter.status!)"
        [class.shadow-sm]="isStatusSelected(filter.status!)"
        [class]="isStatusSelected(filter.status!) ? filter.colorClass : 'text-text-muted hover:text-text-secondary'"
        (click)="selectStatus(filter.status)"
      >
        @if (filter.icon) {
          <i [class]="filter.icon" class="mr-1 text-[10px]"></i>
        }
        {{ filter.label }}
      </button>
    }
  </div>

  <!-- Filtro móvil -->
  <div class="block sm:hidden w-full">
    <div class="relative">
      <select
        class="pds-filter-select w-full"
        (change)="onSelectChange($event)"
        [value]="getSelectedFilterValue()"
      >
        @for (filter of statusFilters; track filter.status ?? 'all') {
          <option [value]="filter.status ?? 'all'">{{ filter.label }}</option>
        }
      </select>
      <span class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-text-muted text-xs pointer-events-none"></span>
    </div>
  </div>

</div>

<div class="pds-info-panel">

  <div class="flex items-center justify-between mb-3">
    <p class="pds-section-title text-xs mb-0">
      <span class="fa-solid fa-flask text-amber-400 mr-1.5"></span>
      Receta / Ingredientes
      @if (items().length > 0) {
        <span class="ml-1.5 px-1.5 py-0.5 rounded-full bg-amber-500/10 text-amber-400 text-[10px]">
          {{ items().length }}
        </span>
      }
    </p>
    <button type="button" (click)="openModal.emit()" class="pds-btn-secondary btn-xs gap-1">
      <span class="fa-solid fa-pen-to-square text-[10px]"></span>
      Gestionar
    </button>
  </div>

  @if (items().length > 0) {
    <div class="space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar">
      @for (item of items(); track $index) {
        <div class="flex items-center gap-2 px-2.5 py-2 rounded-lg bg-background hover:bg-surface-nav transition-colors group">
          <span class="fa-solid fa-flask text-amber-400 text-[10px] shrink-0"></span>
          <span class="flex-1 text-xs text-text-primary truncate">{{ item.name }}</span>
          <span class="font-mono text-xs text-text-muted shrink-0">
            {{ item.quantity }} {{ item.unitOfMeasure }}
          </span>
          <button
            type="button"
            (click)="removeItem.emit($index)"
            class="pds-btn-icon w-5 h-5 text-red-400 hover:text-red-300 opacity-0 group-hover:opacity-100 transition-opacity shrink-0"
          >
            <span class="fa-solid fa-xmark text-[10px]"></span>
          </button>
        </div>
      }
    </div>
  } @else {
    <div class="flex flex-col items-center gap-1.5 py-5 border-2 border-dashed border-border rounded-xl">
      <span class="fa-solid fa-flask text-amber-400/40 text-2xl"></span>
      <p class="text-xs text-text-muted">Sin ingredientes — haz clic en "Gestionar"</p>
    </div>
  }

</div>

<div class="pds-modal-overlay" (click)="goBack()">
  <div class="pds-modal max-w-lg" (click)="$event.stopPropagation()">
    <div class="pds-modal-header">
      <div
        class="w-9 h-9 rounded-xl bg-amber-500/15 flex items-center justify-center shrink-0"
      >
        <span class="fa-solid fa-flask text-amber-400"></span>
      </div>
      <div class="flex-1 min-w-0">
        <h2 class="pds-modal-title">Nuevo Ingrediente</h2>
        <p class="text-xs text-text-muted mt-0.5">
          Insumo para recetas del menú
        </p>
      </div>
      <button class="pds-modal-close" (click)="goBack()">
        <span class="fa-solid fa-xmark"></span>
      </button>
    </div>

    <div class="pds-modal-body space-y-4">
      @if (errorMessage()) {
        <div class="pds-alert-error">
          <span class="fa-solid fa-exclamation-circle shrink-0"></span>
          {{ errorMessage() }}
        </div>
      }

      <app-insumo-fields
        [(name)]="name"
        [(quantity)]="quantity"
        [(selectedUnit)]="selectedUnit"
        [allowedUnits]="allowedUnits"
        [quantityStep]="quantityStep"
        (unitChange)="onUnitChange($event)"
      />
    </div>

    <div class="pds-modal-footer">
      <button class="pds-btn-secondary btn-sm" type="button" (click)="goBack()">
        Cancelar
      </button>
      <button
        class="pds-btn-primary btn-sm disabled:opacity-50"
        (click)="onSubmit($event)"
        [disabled]="isSubmitting()"
      >
        @if (isSubmitting()) {
          <span class="loading loading-spinner loading-xs"></span>
          Guardando...
        } @else {
          <span class="fa-solid fa-check text-xs"></span>
          Guardar Ingrediente
        }
      </button>
    </div>
  </div>
</div>

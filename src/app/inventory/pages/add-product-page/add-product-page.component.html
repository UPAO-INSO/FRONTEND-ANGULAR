<div class="pds-modal-overlay" (click)="goBack()">
  <div class="pds-modal max-w-xl" (click)="$event.stopPropagation()">

    <div class="pds-modal-header">
      <div class="w-9 h-9 rounded-xl bg-brand/15 flex items-center justify-center shrink-0">
        <span class="fa-solid fa-utensils text-brand"></span>
      </div>
      <div class="flex-1 min-w-0">
        <h2 class="pds-modal-title">Nuevo Producto</h2>
        <p class="text-xs text-text-muted mt-0.5">Plato, bebida o descartable del menú</p>
      </div>
      <button class="pds-modal-close" (click)="goBack()">
        <span class="fa-solid fa-xmark"></span>
      </button>
    </div>

    @if (isLoading()) {
      <div class="pds-modal-body flex justify-center py-10">
        <span class="loading loading-bars loading-lg text-brand"></span>
      </div>
    } @else {

      <div class="pds-modal-body space-y-4">

        @if (errorMessage()) {
          <div class="pds-alert-error">
            <span class="fa-solid fa-exclamation-circle shrink-0"></span>
            {{ errorMessage() }}
          </div>
        }

        <!-- Campos básicos -->
        <app-product-fields
          [(name)]="name"
          [(price)]="price"
          [(description)]="description"
          [selectedTypeId]="selectedTypeId()"
          [productTypes]="productTypes()"
          (typeChange)="onTypeChange($event)"
        />

        <!-- Stock (bebidas/descartables) -->
        @if (isBeverageOrDisposable()) {
          <app-stock-section
            [isNew]="true"
            [typeName]="selectedTypeName()"
            [quantity]="initialQuantity()"
            (quantityChange)="onInitialQuantityChange($event)"
          />
        }

        <!-- Receta (platos) -->
        @if (!isBeverageOrDisposable()) {
          <app-recipe-section
            [items]="recipeItems()"
            (openModal)="openRecipeModal()"
            (removeItem)="removeRecipeItem($event)"
          />
        }

      </div>

      <div class="pds-modal-footer">
        <button class="pds-btn-secondary btn-sm" type="button" (click)="goBack()">Cancelar</button>
        <button
          class="pds-btn-primary btn-sm disabled:opacity-50"
          (click)="onSubmit($event)"
          [disabled]="isSubmitting()"
        >
          @if (isSubmitting()) {
            <span class="loading loading-spinner loading-xs"></span> Guardando...
          } @else {
            <span class="fa-solid fa-check text-xs"></span> Guardar Producto
          }
        </button>
      </div>

    }
  </div>
</div>

@if (showRecipeModal() && !isBeverageOrDisposable()) {
  <app-recipe-modal
    [initialItems]="recipeItems()"
    (close)="closeRecipeModal()"
    (addRecipe)="onRecipeAdded($event)"
  />
}

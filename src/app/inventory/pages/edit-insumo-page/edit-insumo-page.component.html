<div class="pds-modal-overlay" (click)="goBack()">
  <div class="pds-modal max-w-lg" (click)="$event.stopPropagation()">

    @if (isLoading()) {
      <div class="pds-modal-body flex justify-center py-10">
        <span class="loading loading-bars loading-lg text-brand"></span>
      </div>
    } @else {

      <div class="pds-modal-header">
        <div class="w-9 h-9 rounded-xl bg-amber-500/15 flex items-center justify-center shrink-0">
          <span class="fa-solid fa-flask text-amber-400"></span>
        </div>
        <div class="flex-1 min-w-0">
          <h2 class="pds-modal-title truncate">{{ originalItem()?.name ?? 'Ingrediente' }}</h2>
          <span class="inline-block text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full bg-amber-500/10 text-amber-400 mt-0.5">
            {{ typeLabels[selectedType()] }}
          </span>
        </div>
        <button class="pds-modal-close" (click)="goBack()">
          <span class="fa-solid fa-xmark"></span>
        </button>
      </div>

      <div class="pds-modal-body">
        @if (errorMessage()) {
          <div class="pds-alert-error mb-4">
            <span class="fa-solid fa-exclamation-circle shrink-0"></span>
            {{ errorMessage() }}
          </div>
        }

        <app-insumo-fields
          [(name)]="name"
          [(quantity)]="quantity"
          [(selectedUnit)]="selectedUnit"
          [allowedUnits]="allowedUnits"
          [quantityStep]="quantityStep"
          (unitChange)="onUnitChange($event)"
        />
      </div>

      <div class="pds-modal-footer">
        <button
          type="button"
          (click)="onDelete()"
          [disabled]="isDeleting()"
          class="pds-btn-danger btn-sm disabled:opacity-50 mr-auto"
        >
          @if (isDeleting()) { <span class="loading loading-spinner loading-xs"></span> }
          @else { <span class="fa-solid fa-trash text-xs"></span> }
          Eliminar
        </button>
        <button class="pds-btn-secondary btn-sm" type="button" (click)="goBack()">Cancelar</button>
        <button
          type="button"
          (click)="onSubmit($event)"
          [disabled]="isSubmitting()"
          class="pds-btn-primary btn-sm disabled:opacity-50"
        >
          @if (isSubmitting()) {
            <span class="loading loading-spinner loading-xs"></span> Guardando...
          } @else {
            <span class="fa-solid fa-check text-xs"></span> Guardar
          }
        </button>
      </div>

    }
  </div>
</div>
